<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos Arco Iris</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#fdf6e3 0%,#fce4ec 50%,#e8f5e9 100%);min-height:100vh;padding:16px}
.container{max-width:1200px;margin:0 auto}
.header{background:linear-gradient(135deg,#ff6b6b,#ffa726,#ffee58,#66bb6a,#42a5f5,#ab47bc);border-radius:16px;padding:24px;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,0.15);text-align:center}
.header h1{
    color:#1E1E1E;
    font-size:2.2em;
    font-weight:900;
    letter-spacing:2px;
    text-shadow:1px 1px 2px rgba(255,255,255,.8);
}
.header p{color:#222;font-size:1.1em;font-weight:600;opacity:1;margin-top:6px;text-shadow:1px 1px 2px rgba(255,255,255,.7);}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.card h2{color:#333;font-size:1.3em;margin-bottom:16px;padding-bottom:8px;border-bottom:3px solid;display:inline-block}
.card h2.c1{border-color:#ff6b6b}
.card h2.c2{border-color:#ffa726}
.card h2.c3{border-color:#66bb6a}
.card h2.c4{border-color:#42a5f5}
.card h2.c5{border-color:#ab47bc}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column}
.form-group label{font-size:.85em;color:#666;font-weight:600;margin-bottom:2px}
.form-group input,.form-group select{padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:1em;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{outline:0;border-color:#ffa726}
.cliente-search{position:relative}
.cliente-search .suggestions{position:absolute;top:100%;left:0;right:0;background:#fff;border:2px solid #e0e0e0;border-top:0;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:100;display:none}
.cliente-search .suggestions div{padding:8px 12px;cursor:pointer;font-size:.9em;border-bottom:1px solid #f0f0f0}
.cliente-search .suggestions div:hover{background:#fff3e0}
.cliente-search .suggestions div .ciudad{color:#999;font-size:.8em}
.tabla-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.9em}
table th{background:linear-gradient(135deg,#ffa726,#ff6b6b);color:#fff;padding:10px 8px;text-align:center;font-weight:700;white-space:nowrap;position:sticky;top:0}
table th:first-child{text-align:left;min-width:130px}
table td{padding:8px;border-bottom:1px solid #f0f0f0;text-align:center}
table td:first-child{text-align:left;font-weight:600;color:#444}
table tr:hover{background:#fff8e1}
table tr.total-row{background:#fff3e0;font-weight:700}
table tr.total-row td{border-top:2px solid #ffa726}
input.qty{width:60px;padding:6px;border:2px solid #e0e0e0;border-radius:6px;text-align:center;font-size:.9em;font-weight:600}
input.qty:focus{outline:0;border-color:#ffa726;box-shadow:0 0 0 3px rgba(255,167,38,0.2)}
.simple-qty input.qty{width:80px}
.resumen{background:#f5f5f5;border-radius:12px;padding:16px;margin-top:16px}
.resumen h3{color:#333;margin-bottom:8px}
.resumen-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.resumen-item{background:#fff;border-radius:8px;padding:12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.resumen-item .label{font-size:.75em;color:#888;text-transform:uppercase;font-weight:600}
.resumen-item .value{font-size:1.4em;font-weight:900;color:#ff6b6b;margin-top:2px}
.resumen-item .value.green{color:#66bb6a}
.resumen-item .value.blue{color:#42a5f5}
.resumen-item .value.purple{color:#ab47bc}
.total-general{background:linear-gradient(135deg,#ff6b6b,#ffa726);color:#fff;padding:16px;border-radius:12px;text-align:center;font-size:1.6em;font-weight:900;margin-top:12px;box-shadow:0 2px 12px rgba(255,107,107,0.3)}
.acciones{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
.btn{flex:1;min-width:200px;padding:14px 24px;border:0;border-radius:10px;font-size:1em;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .2s;text-align:center}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,0.15)}
.btn:active{transform:translateY(0)}
.btn-primary{background:linear-gradient(135deg,#ff6b6b,#ffa726);color:#fff}
.btn-secondary{background:linear-gradient(135deg,#42a5f5,#66bb6a);color:#fff}
.btn-danger{background:linear-gradient(135deg,#ef5350,#e53935);color:#fff}
.btn-outline{background:#fff;color:#666;border:2px solid #e0e0e0}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.resumen-texto{background:#fff;border:2px solid #e0e0e0;border-radius:8px;padding:16px;margin-top:12px;max-height:300px;overflow-y:auto;font-family:'Courier New',monospace;font-size:.85em;line-height:1.5;white-space:pre-wrap;display:none}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:10px;font-size:.9em;box-shadow:0 4px 20px rgba(0,0,0,0.2);z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.cat-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.cat-header:hover{opacity:.8}
.cat-header .toggle{font-size:.8em;color:#999;transition:transform .2s}
.cat-header .toggle.open{transform:rotate(180deg)}
.cat-body{overflow:hidden;transition:max-height .3s ease}
.cat-body.collapsed{max-height:0}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>🌈 ARCO IRIS</h1>
  <p>Hoja de Pedidos — Decoración para toda ocasión</p>
</div>

<div class="card">
  <h2 class="c1">📋 Datos del Cliente</h2>
  <div class="form-grid">
    <div class="form-group cliente-search">
      <label>Buscar Cliente</label>
      <input type="text" id="searchCliente" placeholder="Escriba nombre del cliente..." autocomplete="off">
      <div class="suggestions" id="suggestions"></div>
    </div>
    <div class="form-group">
      <label>Fecha del Pedido</label>
      <input type="date" id="fecha">
    </div>
    <div class="form-group">
      <label>Nombre del Cliente</label>
      <input type="text" id="cliente" placeholder="Nombre completo">
    </div>
    <div class="form-group">
      <label>Dirección</label>
      <input type="text" id="direccion" placeholder="Dirección">
    </div>
    <div class="form-group">
      <label>Teléfono</label>
      <input type="text" id="telefono" placeholder="Teléfono">
    </div>
    <div class="form-group">
      <label>Ciudad</label>
      <input type="text" id="ciudad" placeholder="Ciudad">
    </div>
    <div class="form-group">
      <label>NIT</label>
      <input type="text" id="nit" placeholder="NIT">
    </div>
    <div class="form-group">
      <label>Vendedor</label>
      <input type="text" id="vendedor" placeholder="Vendedor">
    </div>
  </div>
</div>

<div id="categorias"></div>

<div class="card">
  <h2 class="c4">📊 Resumen del Pedido</h2>
  <div class="resumen" id="resumenContainer">
    <div class="resumen-grid" id="resumenGrid"></div>
    <div class="total-general" id="totalGeneral">Total: 0 unidades</div>
  </div>
</div>

<div class="card">
  <h2 class="c2">📬 Enviar Pedido</h2>
  <p style="color:#666;margin-bottom:12px">Genere el resumen de su pedido para enviarlo por correo electrónico a Arco Iris.</p>
  <div class="acciones">
    <button class="btn btn-primary" id="btnGenerar">📄 Generar Resumen</button>
    <button class="btn btn-secondary" id="btnCopiar" disabled>📋 Copiar al Portapapeles</button>
    <button class="btn btn-secondary" id="btnDescargar" disabled>⬇️ Descargar (.txt)</button>
    <button class="btn btn-primary" id="btnEmail">📧 Enviar por Correo</button>
    <button class="btn btn-danger" id="btnLimpiar">🗑️ Limpiar Pedido</button>
  </div>
  <div class="resumen-texto" id="resumenTexto"></div>
</div>

</div>

<div class="toast" id="toast"></div>

// ===== STATE =====
const STORAGE_KEY = 'pedido_arcoiris';
let data = {};

// ===== DOM REFS =====
const $ = id => document.getElementById(id);
const searchCliente = $('searchCliente');
const suggestions = $('suggestions');
const categoriasEl = $('categorias');
const resumenGrid = $('resumenGrid');
const totalGeneral = $('totalGeneral');
const resumenTexto = $('resumenTexto');
const toast = $('toast');

// ===== INIT =====
function init() {
  $('fecha').valueAsDate = new Date();
  loadState();
  renderCategorias();
  updateResumen();
  bindEvents();
}

// ===== STATE MANAGEMENT =====
function saveState() {
  const state = {
    cliente: $('cliente').value,
    direccion: $('direccion').value,
    telefono: $('telefono').value,
    ciudad: $('ciudad').value,
    nit: $('nit').value,
    vendedor: $('vendedor').value,
    fecha: $('fecha').value,
    searchCliente: searchCliente.value,
    productos: data
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!saved) return;
    $('cliente').value = saved.cliente || '';
    $('direccion').value = saved.direccion || '';
    $('telefono').value = saved.telefono || '';
    $('ciudad').value = saved.ciudad || '';
    $('nit').value = saved.nit || '';
    $('vendedor').value = saved.vendedor || '';
    $('fecha').value = saved.fecha || '';
    searchCliente.value = saved.searchCliente || '';
    if (saved.productos) data = saved.productos;
  } catch(e) {}
}

function getQty(catId, item, prod) {
  if (!data[catId]) data[catId] = {};
  if (!data[catId][item]) data[catId][item] = {};
  const k = prod || '_qty';
  if (data[catId][item][k] === undefined) data[catId][item][k] = 0;
  return data[catId][item][k];
}

function setQty(catId, item, val, prod) {
  if (!data[catId]) data[catId] = {};
  if (!data[catId][item]) data[catId][item] = {};
  const k = prod || '_qty';
  data[catId][item][k] = Math.max(0, parseInt(val) || 0);
  saveState();
  updateResumen();
}

// ===== CATEGORY RENDER =====
function renderCategorias() {
  categoriasEl.innerHTML = '';
  CATEGORIAS.forEach((cat, ci) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="cat-header" data-cat="${cat.id}">
        <h2 class="${cat.color}">${cat.nombre}</h2>
        <span class="toggle open">▼</span>
      </div>
      <div class="cat-body" id="body-${cat.id}"></div>
    `;
    categoriasEl.appendChild(div);
    const body = div.querySelector('.cat-body');
    if (cat.type === 'grid') {
      renderGridCat(body, cat);
    } else {
      renderSimpleCat(body, cat);
    }
    div.querySelector('.cat-header').addEventListener('click', () => {
      const b = div.querySelector('.cat-body');
      const t = div.querySelector('.toggle');
      b.classList.toggle('collapsed');
      t.classList.toggle('open');
    });
  });
}

function renderGridCat(el, cat) {
  const wrap = document.createElement('div');
  wrap.className = 'tabla-wrap';
  let html = '<table><thead><tr><th>' + cat.nombre + '</th>';
  cat.productos.forEach(p => { html += '<th>' + p + '</th>'; });
  html += '</tr></thead><tbody>';
  cat.items.forEach(item => {
    html += '<tr><td>' + item + '</td>';
    cat.productos.forEach(prod => {
      const val = getQty(cat.id, item, prod);
      html += '<td><input class="qty" type="number" min="0" value="' + val + '" data-cat="' + cat.id + '" data-item="' + item + '" data-prod="' + prod + '"></td>';
    });
    html += '</tr>';
  });
  html += '<tr class="total-row"><td>TOTAL ' + cat.nombre + '</td>';
  cat.productos.forEach(prod => {
    let total = 0;
    cat.items.forEach(item => { total += parseInt(getQty(cat.id, item, prod)) || 0; });
    html += '<td id="t-' + cat.id + '-' + prod + '">' + total + '</td>';
  });
  html += '</tr></tbody></table>';
  wrap.innerHTML = html;
  el.appendChild(wrap);
  el.querySelectorAll('input.qty').forEach(inp => {
    inp.addEventListener('input', onQtyInput);
  });
}

function renderSimpleCat(el, cat) {
  const wrap = document.createElement('div');
  wrap.className = 'tabla-wrap simple-qty';
  let html = '<table><thead><tr><th>' + cat.nombre + '</th><th>Cant.</th></tr></thead><tbody>';
  cat.items.forEach(item => {
    const val = getQty(cat.id, item);
    html += '<tr><td>' + item + '</td><td><input class="qty" type="number" min="0" value="' + val + '" data-cat="' + cat.id + '" data-item="' + item + '"></td></tr>';
  });
  let total = 0;
  cat.items.forEach(item => { total += parseInt(getQty(cat.id, item)) || 0; });
  html += '<tr class="total-row"><td>TOTAL ' + cat.nombre + '</td><td id="t-' + cat.id + '">' + total + '</td></tr>';
  html += '</tbody></table>';
  wrap.innerHTML = html;
  el.appendChild(wrap);
  el.querySelectorAll('input.qty').forEach(inp => {
    inp.addEventListener('input', onQtyInput);
  });
}

function onQtyInput(e) {
  const inp = e.target;
  const cat = inp.dataset.cat;
  const item = inp.dataset.item;
  const prod = inp.dataset.prod;
  setQty(cat, item, inp.value, prod);
  updateGridTotals(cat);
}

function updateGridTotals(catId) {
  const cat = CATEGORIAS.find(c => c.id === catId);
  if (!cat) return;
  if (cat.type === 'grid') {
    cat.productos.forEach(prod => {
      let total = 0;
      cat.items.forEach(item => { total += parseInt(getQty(catId, item, prod)) || 0; });
      const el = document.getElementById('t-' + catId + '-' + prod);
      if (el) el.textContent = total;
    });
  } else {
    let total = 0;
    cat.items.forEach(item => { total += parseInt(getQty(catId, item)) || 0; });
    const el = document.getElementById('t-' + catId);
    if (el) el.textContent = total;
  }
}

// ===== RESUME =====
function updateResumen() {
  const totals = {};
  let totalUnidades = 0;
  CATEGORIAS.forEach(cat => {
    let catTotal = 0;
    if (cat.type === 'grid') {
      cat.items.forEach(item => {
        cat.productos.forEach(prod => {
          const q = parseInt(getQty(cat.id, item, prod)) || 0;
          catTotal += q;
          totalUnidades += q;
        });
      });
    } else {
      cat.items.forEach(item => {
        const q = parseInt(getQty(cat.id, item)) || 0;
        catTotal += q;
        totalUnidades += q;
      });
    }
    totals[cat.nombre] = catTotal;
  });
  let html = '';
  const colors = ['#ff6b6b','#ffa726','#66bb6a','#42a5f5','#ab47bc'];
  CATEGORIAS.forEach((cat, i) => {
    html += '<div class="resumen-item"><div class="label">' + cat.nombre + '</div><div class="value" style="color:' + colors[i % colors.length] + '">' + totals[cat.nombre] + '</div></div>';
  });
  html += '<div class="resumen-item"><div class="label">TOTAL ÍTEMS</div><div class="value green">' + totalUnidades + '</div></div>';
  resumenGrid.innerHTML = html;
  totalGeneral.textContent = '🎯 Total: ' + totalUnidades + ' unidades';
}

// ===== CLIENT SEARCH =====
let selectedClientIdx = -1;

searchCliente.addEventListener('input', function() {
  const val = this.value.toLowerCase().trim();
  selectedClientIdx = -1;
  if (val.length < 2) { suggestions.style.display = 'none'; return; }
  const matches = [];
  for (let i = 0; i < CLIENTES.length; i++) {
    const c = CLIENTES[i];
    if (c.n.toLowerCase().includes(val)) {
      matches.push({ ...c, idx: i });
      if (matches.length >= 15) break;
    }
  }
  if (!matches.length) { suggestions.style.display = 'none'; return; }
  suggestions.innerHTML = matches.map((c, idx) =>
    '<div data-idx="' + idx + '" data-client-idx="' + c.idx + '">' + c.n + ' <span class="ciudad">' + c.c + '</span></div>'
  ).join('');
  suggestions.style.display = 'block';
  suggestions.querySelectorAll('div').forEach(el => {
    el.addEventListener('click', function() {
      const c = CLIENTES[parseInt(this.dataset.clientIdx)];
      if (!c) return;
      $('cliente').value = c.n;
      $('direccion').value = c.d;
      $('telefono').value = c.t;
      $('ciudad').value = c.c;
      $('nit').value = c.i;
      searchCliente.value = c.n;
      suggestions.style.display = 'none';
      saveState();
    });
  });
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.cliente-search')) {
    suggestions.style.display = 'none';
  }
});

// ===== GENERATE RESUME TEXT =====
function generateResumeText() {
  const cl = $('cliente').value || '____________________';
  const dir = $('direccion').value || '____________________';
  const tel = $('telefono').value || '____________________';
  const ciu = $('ciudad').value || '____________________';
  const nit = $('nit').value || '____________________';
  const ven = $('vendedor').value || '____________________';
  const fec = $('fecha').value || new Date().toISOString().split('T')[0];

  let text = '=========================================\n';
  text += '       HOJA DE PEDIDOS ARCO IRIS\n';
  text += '=========================================\n\n';
  text += 'CLIENTE:    ' + cl + '\n';
  text += 'DIRECCIÓN:  ' + dir + '\n';
  text += 'TELÉFONO:   ' + tel + '\n';
  text += 'CIUDAD:     ' + ciu + '\n';
  text += 'NIT:        ' + nit + '\n';
  text += 'VENDEDOR:   ' + ven + '\n';
  text += 'FECHA:      ' + fec + '\n\n';
  text += '-----------------------------------------\n\n';

  CATEGORIAS.forEach(cat => {
    let hasItems = false;
    let catLines = [];
    if (cat.type === 'grid') {
      cat.items.forEach(item => {
        const lineParts = [item];
        cat.productos.forEach(prod => {
          const q = parseInt(getQty(cat.id, item, prod)) || 0;
          lineParts.push(q);
        });
        if (lineParts.slice(1).some(v => v > 0)) {
          hasItems = true;
          const prodStr = cat.productos.map((p, i) => (lineParts[i+1] > 0 ? p + ':' + lineParts[i+1] : '')).filter(s => s).join(', ');
          catLines.push('  ' + item + ' → ' + prodStr);
        }
      });
    } else {
      cat.items.forEach(item => {
        const q = parseInt(getQty(cat.id, item)) || 0;
        if (q > 0) {
          hasItems = true;
          catLines.push('  ' + item + ': ' + q);
        }
      });
    }
    if (hasItems) {
      text += '📦 ' + cat.nombre + '\n';
      text += catLines.join('\n') + '\n\n';
    }
  });

  // totals
  let totalUnidades = 0;
  CATEGORIAS.forEach(cat => {
    if (cat.type === 'grid') {
      cat.items.forEach(item => {
        cat.productos.forEach(prod => {
          totalUnidades += parseInt(getQty(cat.id, item, prod)) || 0;
        });
      });
    } else {
      cat.items.forEach(item => {
        totalUnidades += parseInt(getQty(cat.id, item)) || 0;
      });
    }
  });

  text += '-----------------------------------------\n';
  text += 'TOTAL UNIDADES: ' + totalUnidades + '\n';
  text += '=========================================\n\n';
  text += 'Gracias por su pedido. Arco Iris 🎉\n';

  return text;
}

// ===== ACTIONS =====
$('btnGenerar').addEventListener('click', function() {
  const text = generateResumeText();
  resumenTexto.textContent = text;
  resumenTexto.style.display = 'block';
  $('btnCopiar').disabled = false;
  $('btnDescargar').disabled = false;
  showToast('✅ Resumen generado correctamente');
});

$('btnCopiar').addEventListener('click', function() {
  const text = resumenTexto.textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('📋 Copiado al portapapeles');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('📋 Copiado al portapapeles');
  });
});

$('btnDescargar').addEventListener('click', function() {
  const text = resumenTexto.textContent;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const cl = ($('cliente').value || 'pedido').replace(/\s+/g, '_');
  a.download = 'Pedido_ArcoIris_' + cl + '.txt';
  a.href = url;
  a.click();
  URL.revokeObjectURL(url);
  showToast('⬇️ Archivo descargado');
});

$('btnEmail').addEventListener('click', function() {
  const text = generateResumeText();
  resumenTexto.textContent = text;
  resumenTexto.style.display = 'block';
  $('btnCopiar').disabled = false;
  $('btnDescargar').disabled = false;
  const cliente = $('cliente').value || 'Pedido';
  const subject = encodeURIComponent('Pedido Arco Iris - ' + cliente);
  const body = encodeURIComponent(text);
  if (body.length < 2000) {
    window.location.href = 'mailto:?subject=' + subject + '&body=' + body;
    showToast('📧 Abriendo cliente de correo...');
  } else {
    navigator.clipboard.writeText(text).then(function() {
      window.location.href = 'mailto:?subject=' + subject;
      showToast('📋 Resumen copiado al portapapeles. Péguelo en su correo (Ctrl+V)');
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('📋 Resumen copiado. Péguelo en su correo (Ctrl+V)');
      window.location.href = 'mailto:?subject=' + subject;
    });
  }
});

$('btnLimpiar').addEventListener('click', function() {
  if (!confirm('¿Está seguro de limpiar todo el pedido?')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
});

// ===== TOAST =====
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ===== AUTO-SAVE ON CLIENT FIELDS =====
['cliente','direccion','telefono','ciudad','nit','vendedor','fecha'].forEach(id => {
  $(id).addEventListener('input', saveState);
});

// ===== START =====
init();
</script>
</body>
</html>
